<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avertum Group × ArceoConsult – Protective Intelligence</title>
  //fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --dark: #0A0C10;
      --dark2: #111318;
      --dark3: #181C24;
      --border: rgba(201,168,76,0.2);
      --text: #E8E6E0;
      --muted: #8A8680;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px;
      background: rgba(10,12,16,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 14px; }
    .nav-brand img { height: 36px; }
    .nav-brand span {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: var(--gold); letter-spacing: 1px;
    }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 13px;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-lang { display: flex; gap: 8px; }
    .nav-lang a {
      color: var(--muted); font-size: 12px; text-decoration: none;
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 3px;
      transition: all 0.2s;
    }
    .nav-lang a:hover, .nav-lang a.active { color: var(--gold); border-color: var(--gold); }
    .nav-cta {
      background: var(--gold); color: #000 !important;
      padding: 10px 22px !important; border-radius: 3px;
      font-weight: 600 !important; font-size: 12px !important;
      text-transform: uppercase !important; letter-spacing: 1px !important;
    }
    .nav-cta:hover { background: var(--gold-light) !important; color: #000 !important; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
    }
    .hero-inner { position: relative; max-width: 860px; }
    .hero-eyebrow {
      display: inline-block;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 28px;
      padding: 6px 18px; border: 1px solid var(--border); border-radius: 2px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5.5vw, 4rem);
      line-height: 1.18;
      color: #fff;
      margin-bottom: 18px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--gold);
    }
    .hero-sub {
      font-size: 1.15rem; color: var(--muted);
      max-width: 640px; margin: 0 auto 40px;
      font-weight: 300;
    }
    .hero-founders {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 48px;
    }
    .founder-badge {
      display: flex; align-items: center; gap: 10px;
      background: var(--dark3); border: 1px solid var(--border);
      padding: 10px 18px; border-radius: 40px;
    }
    .founder-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gold); display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 14px; color: #000;
      overflow: hidden;
    }
    .founder-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .founder-info { text-align: left; }
    .founder-name { font-size: 13px; font-weight: 600; color: #fff; }
    .founder-title { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; }
    .hero-cta { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: var(--gold); color: #000;
      padding: 16px 36px; border-radius: 3px;
      font-weight: 700; font-size: 13px; text-transform: uppercase;
      letter-spacing: 1.5px; text-decoration: none;
      transition: all 0.2s; display: inline-block;
    }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-secondary {
      background: transparent; color: var(--text);
      padding: 16px 36px; border-radius: 3px;
      border: 1px solid var(--border);
      font-weight: 500; font-size: 13px; text-transform: uppercase;
      letter-spacing: 1px; text-decoration: none;
      transition: all 0.2s; display: inline-block;
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
    .hero-disclaimer {
      margin-top: 20px; font-size: 11px; color: var(--muted);
      letter-spacing: 0.3px;
    }

    /* ── THREAT BAR ── */
    .threat-bar {
      background: rgba(201,168,76,0.08);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex; gap: 40px; justify-content: center;
      flex-wrap: wrap;
    }
    .threat-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
    }
    .threat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

    /* ── SECTIONS ── */
    section { padding: 100px 24px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .section-label {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      color: #fff; margin-bottom: 16px; line-height: 1.25;
    }
    .section-sub { font-size: 1rem; color: var(--muted); max-width: 580px; }
    .divider { width: 48px; height: 2px; background: var(--gold); margin: 28px 0; }

    /* ── THREAT GRID ── */
    .threat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2px; margin-top: 60px;
      border: 1px solid var(--border);
    }
    .threat-card {
      background: var(--dark2);
      padding: 40px 32px;
      border-right: 1px solid var(--border);
      transition: background 0.2s;
    }
    .threat-card:last-child { border-right: none; }
    .threat-card:hover { background: var(--dark3); }
    .threat-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(201,168,76,0.1); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 24px;
    }
    .threat-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; color: #fff; margin-bottom: 12px;
    }
    .threat-card p { font-size: 0.92rem; color: var(--muted); line-height: 1.6; }
    .threat-impact {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--gold);
      text-transform: uppercase; letter-spacing: 1px;
    }

    /* ── PROBLEM SCENARIOS ── */
    .scenarios { background: var(--dark2); }
    .scenario-list { margin-top: 56px; display: flex; flex-direction: column; gap: 2px; }
    .scenario {
      display: grid; grid-template-columns: 60px 1fr auto;
      align-items: start; gap: 32px;
      padding: 36px 40px;
      background: var(--dark);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
      cursor: default;
    }
    .scenario:hover { border-color: var(--gold); }
    .scenario-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem; color: var(--gold); opacity: 0.3;
      line-height: 1;
    }
    .scenario-body h4 {
      font-size: 1.05rem; font-weight: 600; color: #fff;
      margin-bottom: 8px;
    }
    .scenario-body p { font-size: 0.9rem; color: var(--muted); }
    .scenario-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; padding: 4px 10px;
      border: 1px solid var(--border); border-radius: 2px;
      color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ── REGULATORY BREAKDOWN ── */
    .reg-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px; margin-top: 56px;
    }
    .reg-card {
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .reg-header {
      background: rgba(201,168,76,0.08);
      padding: 24px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    .reg-badge {
      background: var(--gold); color: #000;
      font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 2px; text-transform: uppercase; letter-spacing: 1px;
    }
    .reg-header h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #fff; }
    .reg-plain {
      padding: 8px 28px 0;
      font-size: 0.88rem; color: var(--gold);
      font-style: italic;
    }
    .reg-impacts { padding: 20px 28px 28px; }
    .reg-impact {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 16px;
    }
    .reg-impact:last-child { margin-bottom: 0; }
    .impact-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: #000; background: var(--gold);
      padding: 2px 8px; border-radius: 2px;
      white-space: nowrap; margin-top: 2px; font-weight: 700;
      min-width: 80px; text-align: center;
    }
    .impact-label.tech { background: #2A6496; }
    .impact-label.eco { background: #C0392B; }
    .impact-label.legal { background: #8E44AD; }
    .impact-label.rep { background: #27AE60; }
